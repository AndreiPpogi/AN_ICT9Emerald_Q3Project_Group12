<div class="container">

<div class="box">

<h1>Motorcycle Taxi Fare Guide</h1>

<p>
Compute your estimated fare based on the distance of your ride.
The first 2 kilometers are included in the base fare.
</p>

<label>Distance of Ride (KM)</label>

<input type="number" id="distance" class="form-control">

<br>

<label>Passenger Type</label>

<select id="type" class="form-control">
<option value="regular">Regular</option>
<option value="discount">Student / Senior / PWD</option>
</select>

<br>

<button class="btn btn-success" onclick="computeFare()">Compute Fare</button>

<h3 id="result"></h3>

</div>

<footer>

Andrei Viray | Grade 9 | ©2026  
<br>
Source:  
<a href="https://www.metrolinemap.com/metro/manila/" style="color:white">
Manila Metro Rail Map
</a>

</footer>

<script>


let basefare = 50;    
let perKMrate = 15;    
let baseKM = 2;        


function computeFare(){

let distance = document.getElementById("distance").value;
let type = document.getElementById("type").value;

let total = basefare;


if(distance > baseKM){

let extraKM = distance - baseKM;

total = basefare + (extraKM * perKMrate);

}


if(type == "discount"){

total = total * 0.80;

}


total = Math.round(total);


document.getElementById("result").innerHTML =
"Estimated Fare: ₱ " + total;

}

</script>
