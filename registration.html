<!DOCTYPE html>
<html>
<head>

<title>Create Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-image: url("joey-kyber-45FJgZMXCK8-unsplash.jpg");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;
height:100vh;
color: white;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

.formbox{
background:rgba(0,0,0,0.6);
color:white;
padding:30px;
margin-top:50px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="formbox">

<h2>Registration</h2>

<input class="form-control" placeholder="First Name"><br>
<input class="form-control" placeholder="Last Name"><br>
<input class="form-control" placeholder="Age"><br>
<input class="form-control" placeholder="Contact Number"><br>
<input class="form-control" placeholder="Email"><br>
<input class="form-control" placeholder="Username"><br>
<input type="password" class="form-control" placeholder="Password"><br>

<button class="btn btn-primary" onclick="createAccount()">
Create Account
</button>

<a href="index.html" class="btn btn-secondary">Cancel</a>

</div>

</div>

<script>

function createAccount(){

alert("Account Created!");

window.location="confirmation.html";

}

</script>

</body>
</html>
